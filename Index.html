<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Streaming Simplu</h1>

    <main class="grid-video">

            </div>
        </div>

        <!-- Video 2 -->
        <div class="card-video">
            <h3>Episodul 2</h3>

                <iframe src="https://youtube.com" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </main>
